<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09101f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Voyage Smart Travel — the trusted platform for solo travellers. Safety-first, accessibility-led, confidence-built." />
  <meta property="og:title" content="Voyage Smart Travel" />
  <meta property="og:description" content="Travel with confidence. Every journey. Everywhere." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://voyagesmarttravel.com" />
  <title>Voyage Smart Travel</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>

  <!-- ── App shell ───────────────────────────────────────────────────────── -->
  <div id="vst-app">

    <!-- Top navigation -->
    <header class="site-header" id="site-header">
      <div class="header-inner">
        <a class="brand" href="#home" data-route="home" aria-label="Voyage Smart Travel home">
          <span class="brand-mark">VST</span>
          <span class="brand-name">Voyage Smart Travel</span>
        </a>

        <nav class="main-nav" id="main-nav" aria-label="Primary navigation">
          <a href="#home"          data-route="home"          class="nav-link">Home</a>
          <a href="#safety"        data-route="safety"        class="nav-link">Safety</a>
          <a href="#features"      data-route="features"      class="nav-link">Features</a>
          <a href="#partners"      data-route="partners"      class="nav-link">Partners</a>
          <a href="#trip-request"  data-route="trip-request"  class="nav-link">Request Trip</a>
          <a href="#dashboard"     data-route="dashboard"     class="nav-link">Dashboard</a>
          <a href="#contact"       data-route="contact"       class="nav-link nav-cta">Get Started</a>
        </nav>

        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

      <!-- Mobile drawer -->
      <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
        <a href="#home"          data-route="home"          class="mobile-link">Home</a>
        <a href="#about"         data-route="about"         class="mobile-link">About</a>
        <a href="#safety"        data-route="safety"        class="mobile-link">Safety</a>
        <a href="#features"      data-route="features"      class="mobile-link">Features</a>
        <a href="#accessibility" data-route="accessibility" class="mobile-link">Accessibility</a>
        <a href="#partners"      data-route="partners"      class="mobile-link">Partners</a>
        <a href="#trip-request"  data-route="trip-request"  class="mobile-link">Request Trip</a>
        <a href="#dashboard"     data-route="dashboard"     class="mobile-link">Dashboard</a>
        <a href="#contact"       data-route="contact"       class="mobile-link mobile-link-cta">Get Started</a>
      </div>
    </header>

    <!-- Main content — pages render here -->
    <main class="site-main" id="site-main">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Loading…</p>
      </div>
    </main>

    <!-- Footer rendered by components -->
    <footer class="site-footer" id="site-footer"></footer>

  </div><!-- /#vst-app -->

  <!-- ── Scripts — load order matters ──────────────────────────────────── -->
  <script src="js/components.js"></script>
  <script src="js/trips.js"></script>
  <script src="js/ava-engine.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/about.js"></script>
  <script src="pages/safety.js"></script>
  <script src="pages/features.js"></script>
  <script src="pages/accessibility.js"></script>
  <script src="pages/partners.js"></script>
  <script src="pages/contact.js"></script>
  <script src="pages/trip-request.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="js/router.js"></script>

</body>
</html>
