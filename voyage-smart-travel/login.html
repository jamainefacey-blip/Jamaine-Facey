<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="description" content="Sign in to Voyage Smart Travel — your AI-powered travel companion." />
  <title>Sign In — Voyage Smart Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="css/premium.css" />
  <style>
    body { min-height: 100dvh; display: flex; flex-direction: column; }

    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 3rem) clamp(1.25rem,4vw,2.5rem) 4rem;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: clamp(2rem,5vw,2.75rem);
      animation: blur-slide-up 0.65s var(--ease-out) both;
    }

    .auth-eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.6rem;
    }

    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 400;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    .auth-title em { font-style: italic; color: var(--gold); }

    .auth-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .auth-sub a { color: var(--gold); }
    .auth-sub a:hover { text-decoration: underline; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text-subtle);
      font-size: 0.78rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-field { margin-bottom: 1rem; }
    .auth-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }
    .auth-input {
      width: 100%;
      background: rgba(10,15,26,0.7);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .auth-input::placeholder { color: var(--text-subtle); }
    .auth-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .auth-btn {
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      border: none;
    }
    .auth-btn-primary {
      background: var(--gold);
      color: var(--bg);
      margin-top: 0.5rem;
    }
    .auth-btn-primary:hover {
      background: var(--gold-bright);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--gold-glow);
    }
    .auth-btn-primary:active { transform: scale(0.97); }
    .auth-btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    .auth-btn-google {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .auth-btn-google:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.18);
    }
    .auth-btn-google svg { flex-shrink: 0; }

    .auth-forgot {
      font-size: 0.8rem;
      color: var(--text-subtle);
      text-align: right;
      margin-top: 0.4rem;
    }
    .auth-forgot a { color: var(--text-muted); }
    .auth-forgot a:hover { color: var(--gold); }

    .auth-message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-top: 1rem;
    }
    .auth-message.error {
      display: block;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    .auth-message.success {
      display: block;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      color: var(--teal);
    }
  </style>
</head>
<body>

  <!-- ── Navigation ─────────────────────────────────────────────── -->
  <nav class="vst-nav" aria-label="Primary navigation">
    <div class="nav-inner">
      <a class="nav-brand" href="/">
        <span class="nav-brand-mark">VST</span>
        <span class="nav-brand-name">Voyage Smart</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/destinations">Destinations</a>
        <a class="nav-link" href="/planner">AVA Planner</a>
        <a class="nav-link" href="/about">About</a>
        <div id="nav-auth" class="nav-auth-slot"></div>
      </div>
      <button type="button" class="nav-hamburger" id="nav-burger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-mobile" id="nav-mobile" aria-hidden="true">
    <a class="nav-mobile-link" href="/">Home</a>
    <a class="nav-mobile-link" href="/destinations">Destinations</a>
    <a class="nav-mobile-link" href="/planner">AVA Planner</a>
    <a class="nav-mobile-link" href="/about">About</a>
    <div id="nav-mobile-auth"></div>
  </div>

  <!-- ── Auth form ───────────────────────────────────────────────── -->
  <main class="auth-wrap" aria-label="Sign in">
    <div class="auth-card" role="main">
      <p class="auth-eyebrow">Welcome back</p>
      <h1 class="auth-title">Sign in to<br><em>Voyage Smart</em></h1>
      <p class="auth-sub">
        New to VST? <a href="/register">Create an account →</a>
      </p>

      <!-- Google OAuth -->
      <button type="button" class="auth-btn auth-btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or</div>

      <form id="login-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="email">Email address</label>
          <input
            class="auth-input"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input
            class="auth-input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </div>

        <p class="auth-forgot"><a href="#">Forgot password?</a></p>

        <button type="submit" class="auth-btn auth-btn-primary" id="submit-btn">
          Sign in
        </button>

        <div class="auth-message" id="auth-msg" role="alert" aria-live="polite"></div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/premium.js"></script>
  <script src="js/nav-auth.js"></script>
  <script>
    (function () {
      'use strict';

      /* Redirect if already logged in */
      VSTAuth.whenReady(function (user) {
        if (user) {
          var params = new URLSearchParams(window.location.search);
          window.location.href = params.get('return') || '/profile';
        }
      });

      var form      = document.getElementById('login-form');
      var submitBtn = document.getElementById('submit-btn');
      var msgEl     = document.getElementById('auth-msg');
      var googleBtn = document.getElementById('google-btn');

      function showError(msg) {
        msgEl.className = 'auth-message error';
        msgEl.textContent = msg;
      }

      function showSuccess(msg) {
        msgEl.className = 'auth-message success';
        msgEl.textContent = msg;
      }

      googleBtn.addEventListener('click', function () {
        googleBtn.disabled = true;
        googleBtn.textContent = 'Redirecting…';
        VSTAuth.signInWithGoogle().catch(function (err) {
          showError(err.message || 'Google sign-in failed.');
          googleBtn.disabled = false;
          googleBtn.textContent = 'Continue with Google';
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';
        msgEl.className = 'auth-message';

        VSTAuth.signIn(email, password)
          .then(function () {
            showSuccess('Signed in! Redirecting…');
            var params = new URLSearchParams(window.location.search);
            setTimeout(function () {
              window.location.href = params.get('return') || '/profile';
            }, 600);
          })
          .catch(function (err) {
            showError(err.message || 'Sign-in failed. Check your credentials.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign in';
          });
      });
    })();
  </script>
</body>
</html>
