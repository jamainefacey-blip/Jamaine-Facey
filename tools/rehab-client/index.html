<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pain System Rehab</title>
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

  <!-- ── App shell ─────────────────────────────────────────────────────── -->
  <div id="app">

    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-inner">
        <div class="header-logo" id="header-logo">PS</div>
        <div class="header-title" id="header-title">Pain System Rehab</div>
        <div class="header-right" id="header-right"></div>
      </div>
    </header>

    <!-- Main content area — views render here -->
    <main class="app-main" id="app-main">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
        <p>Loading your program…</p>
      </div>
    </main>

    <!-- Bottom navigation (mobile-first) -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-btn active" data-view="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="plan" aria-label="Rehab Plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Plan</span>
      </button>
      <button class="nav-btn" data-view="exercises" aria-label="Exercises">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span>Exercises</span>
      </button>
      <button class="nav-btn" data-view="progress" aria-label="Progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Progress</span>
      </button>
      <button class="nav-btn" data-view="notes" aria-label="Coach Notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Coach</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- ── Modal overlay (used for session check-in) ────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ── Data ─────────────────────────────────────────────────────────── -->
  <script src="scripts/data/client.js"></script>
  <script src="scripts/data/exercises.js"></script>
  <script src="scripts/data/plan.js"></script>

  <!-- ── App ──────────────────────────────────────────────────────────── -->
  <script src="scripts/app.js"></script>

</body>
</html>
