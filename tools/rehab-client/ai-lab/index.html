<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Lab — Execution Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #c9d1d9;
      --muted:    #6e7681;
      --pass:     #3fb950;
      --fail:     #f85149;
      --warn:     #d29922;
      --accent:   #58a6ff;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100%;
    }

    .root { max-width: 860px; margin: 0 auto; padding: 20px 16px 48px; }

    /* ── header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--accent);
    }
    #header-status { font-size: 11px; color: var(--muted); }

    /* ── panels ── */
    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
      background: var(--surface);
    }
    .panel-head {
      padding: 7px 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-body { padding: 14px; }

    /* ── form ── */
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .field { margin-bottom: 12px; }
    input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text);
      font: inherit;
      font-size: 12px;
      outline: none;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.5; }

    #run-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #0d1117;
      font: inherit;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .1em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #run-btn:hover:not(:disabled) { filter: brightness(1.12); }
    #run-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── badges ── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    .bp { background: rgba(63,185,80,.12);  color: var(--pass);  border: 1px solid rgba(63,185,80,.35); }
    .bf { background: rgba(248,81,73,.12);  color: var(--fail);  border: 1px solid rgba(248,81,73,.35); }
    .bw { background: rgba(210,153,34,.12); color: var(--warn);  border: 1px solid rgba(210,153,34,.35); }
    .bb { background: rgba(138,43,226,.12); color: #b388ff;      border: 1px solid rgba(138,43,226,.35); }
    .bi { background: rgba(110,118,129,.1); color: var(--muted); border: 1px solid var(--border); }
    .br { background: rgba(88,166,255,.1);  color: var(--accent);border: 1px solid rgba(88,166,255,.3); }

    /* ── stage table ── */
    .stage-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
    .stage-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
    }
    .stage-table td {
      padding: 7px 8px;
      border-bottom: 1px solid rgba(48,54,61,.5);
      vertical-align: top;
    }
    .stage-table tr:last-child td { border-bottom: none; }
    .t-pass  { color: var(--pass); }
    .t-fail  { color: var(--fail); }
    .t-warn  { color: var(--warn); }
    .t-muted { color: var(--muted); }
    .err-cell { max-width: 260px; word-break: break-word; color: var(--fail); font-size: 11px; }

    /* ── rerun button ── */
    .btn-rerun {
      padding: 2px 10px;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      background: rgba(248,81,73,.1);
      color: var(--fail);
      border: 1px solid rgba(248,81,73,.35);
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-rerun:hover { background: rgba(248,81,73,.2); }
    .btn-rerun:disabled { opacity: .4; cursor: not-allowed; }

    /* ── meta row ── */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .meta-item { font-size: 11px; }
    .meta-k { color: var(--muted); margin-right: 4px; }

    /* ── pipeline output ── */
    details {
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    details:last-child { margin-bottom: 0; }
    details[open] { border-color: rgba(88,166,255,.25); }
    summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
      border-radius: 3px;
    }
    summary:hover { background: rgba(255,255,255,.03); }
    summary::-webkit-details-marker { display: none; }
    .chevron { font-size: 10px; color: var(--muted); transition: transform .15s; display: inline-block; }
    details[open] .chevron { transform: rotate(90deg); }
    .sum-label { flex: 1; font-weight: 600; }
    pre.json-out {
      margin: 0;
      padding: 12px;
      font: inherit;
      font-size: 11px;
      line-height: 1.5;
      color: #8b949e;
      background: var(--bg);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 0 0 3px 3px;
    }
    .err-out {
      padding: 10px 12px;
      font-size: 11px;
      color: var(--fail);
      background: var(--bg);
      border-top: 1px solid var(--border);
      border-radius: 0 0 3px 3px;
      word-break: break-word;
    }

    /* ── log ── */
    .log-line {
      display: flex;
      gap: 10px;
      font-size: 11px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(48,54,61,.3);
    }
    .log-line:last-child { border-bottom: none; }
    .log-k { color: var(--muted); min-width: 140px; flex-shrink: 0; }
    .log-v { word-break: break-all; }
    .log-err  { color: var(--fail); }
    .log-warn { color: var(--warn); }

    /* ── history list ── */
    .history-list { list-style: none; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(48,54,61,.4);
      font-size: 11px;
      cursor: pointer;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { color: var(--accent); }
    .history-item.active { color: var(--accent); }
    .hist-id { color: var(--muted); font-size: 10px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-time { color: var(--muted); font-size: 10px; white-space: nowrap; }
    .hist-dur  { color: var(--muted); font-size: 10px; white-space: nowrap; min-width: 42px; text-align: right; }
    .history-empty { font-size: 11px; color: var(--muted); }

    /* ── rerun controls ── */
    #rerun-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: rgba(248,81,73,.04);
      border-radius: 0 0 6px 6px;
      font-size: 11px;
    }
    #rerun-bar-label { color: var(--fail); flex: 1; }

    /* ── misc ── */
    .hidden { display: none !important; }
    .failed-lbl { font-size: 12px; color: var(--fail); }
    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: _spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes _spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
      .meta-row  { gap: 10px; }
      .stage-table th:nth-child(4),
      .stage-table td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
<div class="root">

  <div class="page-header">
    <h1>AI Lab — Execution Panel</h1>
    <span id="header-status">idle</span>
  </div>

  <!-- ── INPUT ── -->
  <div class="panel" id="panel-input">
    <div class="panel-head"><span>Asset Input</span></div>
    <div class="panel-body">
      <div class="field-row">
        <div>
          <label for="asset-id">Asset ID</label>
          <input type="text" id="asset-id" value="vst" />
        </div>
        <div>
          <label for="asset-name">Asset Name</label>
          <input type="text" id="asset-name" value="Voyage Smart Travels" />
        </div>
      </div>
      <div class="field">
        <label for="source-content">Source content — seed, description, or docs</label>
        <textarea id="source-content" placeholder="Paste asset description or seed content…"></textarea>
      </div>
      <button id="run-btn" type="button">&#9654; Run Pipeline</button>
    </div>
  </div>

  <!-- ── RUN HISTORY ── -->
  <div class="panel" id="panel-history">
    <div class="panel-head">
      <span>Run History</span>
      <span id="history-count" class="badge bi" style="font-size:10px"></span>
    </div>
    <div class="panel-body">
      <ul class="history-list" id="history-list">
        <li class="history-empty" id="history-loading">Loading&#8230;</li>
      </ul>
    </div>
  </div>

  <!-- ── STATUS ── -->
  <div class="panel hidden" id="panel-status">
    <div class="panel-head"><span>Status</span></div>
    <div class="panel-body">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
        <span id="run-badge" class="badge bi">&#8212;</span>
        <span id="failed-lbl" class="failed-lbl"></span>
      </div>
      <table class="stage-table">
        <thead><tr>
          <th>Stage</th>
          <th>Result</th>
          <th>Retries</th>
          <th>Error</th>
          <th>Action</th>
        </tr></thead>
        <tbody id="stage-tbody"></tbody>
      </table>
      <div class="meta-row" id="meta-row"></div>
    </div>
    <!-- rerun bar — shown only when a failed stage is active -->
    <div class="hidden" id="rerun-bar">
      <span id="rerun-bar-label"></span>
      <button id="rerun-bar-btn" type="button" class="btn-rerun">&#8635; Rerun Failed Stage</button>
    </div>
  </div>

  <!-- ── OUTPUT ── -->
  <div class="panel hidden" id="panel-output">
    <div class="panel-head"><span>Pipeline Output</span></div>
    <div class="panel-body" id="output-body"></div>
  </div>

  <!-- ── LOG ── -->
  <div class="panel hidden" id="panel-log">
    <div class="panel-head"><span>Run Log</span></div>
    <div class="panel-body" id="log-body"></div>
  </div>

</div>
<!-- PART 2: JS injected below -->
<script id="app-script">
(function () {
  'use strict';

  // ── constants ─────────────────────────────────────────────────────────────
  var RUNS_INDEX = 'runs/runs-index.json';
  var RUNS_DIR   = 'runs/';

  var STAGE_LABELS = {
    'asset-extraction':     'Extraction',
    'asset-reconstruction': 'Reconstruction',
    'gap-risk-analysis':    'Gap & Risk',
    'monetisation':         'Monetisation',
    'build-output':         'Build Output'
  };

  var PIPELINES = [
    'asset-extraction',
    'asset-reconstruction',
    'gap-risk-analysis',
    'monetisation'
  ];

  var VST_SEED = [
    'identity: Voyage Smart Travels (VST), Layer 2 Commercial Platform, UK jurisdiction,',
    'Pain System asset, positioned for UK SMEs and public sector travel management.',
    '',
    'productDefinition: AI-powered business travel management platform. Reduces manual',
    'booking, compliance checking, and expense reconciliation. Pricing: Starter £49/month,',
    'Business £149/month, Enterprise custom. Target: UK SMEs, travel managers, procurement.',
    '',
    'currentSystem: backend confirmed working. Frontend near-zero. Major blockers are',
    'frontend activation, not backend rebuild.',
    '',
    'dataModels: User, UserPreferences, Membership, Notification, TravelPolicy,',
    'ApprovalWorkflow, BookingRequest, Booking, Expense, Receipt, ComplianceCheck, AuditLog.',
    '',
    'confirmedFlows: user registration, policy configuration, booking request creation,',
    'multi-stage approval workflow, booking confirmation, expense claim, compliance check.',
    '',
    'integrations: GDS/Amadeus (planned), Stripe (payment), calendar sync (planned),',
    'HR system (planned), accounting export (planned).',
    '',
    'techStack: Next.js frontend (planned), Node.js backend, PostgreSQL, Redis, Claude API.',
    '',
    'knownGaps: frontend build not started, no mobile app, GDS integration incomplete,',
    'expense OCR not built, reporting dashboard missing.'
  ].join('\n');

  // ── DOM refs ──────────────────────────────────────────────────────────────
  function $(id) { return document.getElementById(id); }

  var btn          = $('run-btn');
  var panelStatus  = $('panel-status');
  var panelOutput  = $('panel-output');
  var panelLog     = $('panel-log');
  var rerunBar     = $('rerun-bar');
  var rerunBarBtn  = $('rerun-bar-btn');
  var rerunBarLbl  = $('rerun-bar-label');

  // active state
  var _activeRunId      = null;
  var _activeFailedJob  = null;

  // ── bootstrap ─────────────────────────────────────────────────────────────
  $('source-content').value = VST_SEED;
  loadHistory();

  // ── history ───────────────────────────────────────────────────────────────
  function loadHistory() {
    fetch(RUNS_INDEX)
      .then(function (r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
      .then(renderHistory)
      .catch(function () {
        $('history-loading').textContent = 'Could not load run history.';
      });
  }

  function renderHistory(runs) {
    var list = $('history-list');
    list.innerHTML = '';

    if (!runs || !runs.length) {
      var empty = document.createElement('li');
      empty.className = 'history-empty';
      empty.textContent = 'No runs recorded yet.';
      list.appendChild(empty);
      $('history-count').textContent = '0';
      return;
    }

    $('history-count').textContent = runs.length;

    runs.forEach(function (entry) {
      var li = document.createElement('li');
      li.className = 'history-item';
      li.dataset.runId = entry.runId;

      var statusCls = entry.status === 'complete' ? 'bp'
                    : entry.status === 'failed'   ? 'bf'
                    : entry.status === 'partial'  ? 'bw' : 'bi';

      var dur = entry.durationMs != null
        ? (entry.durationMs / 1000).toFixed(1) + 's'
        : '\u2014';

      var ts = entry.startedAt
        ? fmtTime(entry.startedAt)
        : '\u2014';

      li.innerHTML =
        '<span class="badge ' + statusCls + '" style="font-size:10px">' + esc(entry.status) + '</span>' +
        '<span class="hist-id" title="' + esc(entry.runId) + '">' + esc(entry.runId) + '</span>' +
        '<span class="hist-time">' + esc(ts) + '</span>' +
        '<span class="hist-dur">' + esc(dur) + '</span>';

      li.addEventListener('click', function () {
        selectHistoryItem(li, entry.runId);
      });

      list.appendChild(li);
    });
  }

  function selectHistoryItem(el, runId) {
    var items = document.querySelectorAll('.history-item');
    items.forEach(function (i) { i.classList.remove('active'); });
    el.classList.add('active');
    loadRun(runId);
  }

  function loadRun(runId) {
    _activeRunId = runId;
    reset();
    $('header-status').textContent = 'loading\u2026';

    fetch(RUNS_DIR + runId + '.json')
      .then(function (r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
      .then(renderRun)
      .catch(function (err) {
        renderError('Failed to load run ' + runId + ': ' + err);
      });
  }

  // ── run button ────────────────────────────────────────────────────────────
  btn.addEventListener('click', function () {
    var assetId   = $('asset-id').value.trim()   || 'vst';
    var assetName = $('asset-name').value.trim() || assetId;
    var content   = $('source-content').value.trim();
    if (!content) { alert('Source content is required.'); return; }

    setLoading(true);
    reset();

    var payload = {
      assetId:   assetId,
      assetName: assetName,
      sources:   [{ kind: 'doc', label: 'Operator input', content: content }],
      pipelines: PIPELINES
    };

    fetch('/ai-lab/run', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function (res) {
      return res.json().then(function (data) {
        if (!res.ok || data.error) renderError(data.error || 'HTTP ' + res.status);
        else { renderRun(data); loadHistory(); }
      });
    })
    .catch(function (err) { renderError(err.message || 'Network error'); })
    .finally(function () { setLoading(false); });
  });

  // ── rerun failed stage ────────────────────────────────────────────────────
  rerunBarBtn.addEventListener('click', function () {
    if (!_activeFailedJob) return;
    var assetId  = $('asset-id').value.trim()   || 'vst';
    var content  = $('source-content').value.trim();

    rerunBarBtn.disabled = true;
    rerunBarBtn.innerHTML = '<span class="spin"></span>Rerunning\u2026';

    var payload = {
      assetId:   assetId,
      assetName: $('asset-name').value.trim() || assetId,
      sources:   [{ kind: 'doc', label: 'Operator input', content: content }],
      pipelines: [_activeFailedJob.pipelineId]
    };

    fetch('/ai-lab/run', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.error) renderError(data.error);
      else { renderRun(data); loadHistory(); }
    })
    .catch(function (err) { renderError(err.message || 'Network error'); })
    .finally(function () {
      rerunBarBtn.disabled = false;
      rerunBarBtn.innerHTML = '&#8635; Rerun Failed Stage';
    });
  });

  // ── render run ────────────────────────────────────────────────────────────
  function renderRun(run) {
    var jobs   = run.jobs   || [];
    var status = run.status || 'unknown';

    // status badge
    panelStatus.classList.remove('hidden');
    var badgeEl = $('run-badge');
    if      (status === 'complete') { badgeEl.className = 'badge bp'; badgeEl.textContent = 'PASS'; }
    else if (status === 'partial')  { badgeEl.className = 'badge bw'; badgeEl.textContent = 'PARTIAL'; }
    else if (status === 'failed')   { badgeEl.className = 'badge bf'; badgeEl.textContent = 'FAIL'; }
    else                            { badgeEl.className = 'badge bb'; badgeEl.textContent = status.toUpperCase(); }

    // stage table
    var tbody        = $('stage-tbody');
    tbody.innerHTML  = '';
    var firstFailed  = null;
    var totalRetries = 0;

    jobs.forEach(function (job) {
      var retries = Array.isArray(job.retries) ? job.retries.length : 0;
      totalRetries += retries;
      var ok = job.status === 'complete';
      if (!ok && !firstFailed) firstFailed = job;

      var errText = job.error
        ? '<span class="err-cell" title="' + esc(job.error) + '">'
            + esc(job.error.length > 60 ? job.error.slice(0, 60) + '\u2026' : job.error)
            + '</span>'
        : '<span class="t-muted">\u2014</span>';

      var actionCell = !ok
        ? '<button class="btn-rerun" data-pipeline="' + esc(job.pipelineId) + '">&#8635; Rerun</button>'
        : '<span class="t-muted">\u2014</span>';

      var row = document.createElement('tr');
      row.innerHTML =
        '<td>' + esc(STAGE_LABELS[job.pipelineId] || job.pipelineId) + '</td>' +
        '<td class="' + (ok ? 't-pass' : 't-fail') + '">' + (ok ? '\u2713 pass' : '\u2717 fail') + '</td>' +
        '<td class="' + (retries > 0 ? 't-warn' : 't-muted') + '">' + retries + '</td>' +
        '<td>' + errText + '</td>' +
        '<td>' + actionCell + '</td>';
      tbody.appendChild(row);
    });

    // wire per-row rerun buttons
    tbody.querySelectorAll('.btn-rerun').forEach(function (btnEl) {
      btnEl.addEventListener('click', function () {
        var pid = btnEl.dataset.pipeline;
        var job = jobs.find(function (j) { return j.pipelineId === pid; });
        if (job) triggerSingleRerun(job);
      });
    });

    // failed label + rerun bar
    if (firstFailed) {
      $('failed-lbl').textContent = '\u2191 failed at: ' + (STAGE_LABELS[firstFailed.pipelineId] || firstFailed.pipelineId);
      _activeFailedJob = firstFailed;
      rerunBarLbl.textContent = 'Failed stage: ' + (STAGE_LABELS[firstFailed.pipelineId] || firstFailed.pipelineId);
      rerunBar.classList.remove('hidden');
    } else {
      _activeFailedJob = null;
      rerunBar.classList.add('hidden');
    }

    // meta row
    var started    = run.startedAt;
    var completed  = run.completedAt;
    var durationMs = started && completed
      ? ((new Date(completed) - new Date(started)) / 1000).toFixed(1) + 's'
      : '\u2014';

    $('meta-row').innerHTML =
      metaItem('Run ID',    run.runId       || '\u2014', '') +
      metaItem('Started',   fmtTime(started),            '') +
      metaItem('Completed', fmtTime(completed),          '') +
      metaItem('Duration',  durationMs,                  '') +
      metaItem('Retries',   totalRetries, totalRetries > 0 ? 't-warn' : 't-muted') +
      metaItem('Mode',      run.mode        || '\u2014', '');

    $('header-status').textContent = status;

    // output panel
    panelOutput.classList.remove('hidden');
    var outBody = $('output-body');
    outBody.innerHTML = '';

    jobs.forEach(function (job) {
      var ok      = job.status === 'complete';
      var label   = STAGE_LABELS[job.pipelineId] || job.pipelineId;
      var retries = Array.isArray(job.retries) ? job.retries.length : 0;

      var retryBadge = retries > 0
        ? ' <span class="badge bw" style="font-size:10px">'
            + retries + ' retr' + (retries === 1 ? 'y' : 'ies') + '</span>'
        : '';

      var inner = ok && job.output
        ? '<pre class="json-out">' + esc(JSON.stringify(job.output, null, 2)) + '</pre>'
        : job.error
          ? '<div class="err-out">' + esc(job.error) + '</div>'
          : '<div class="err-out" style="color:var(--muted)">No output.</div>';

      var det = document.createElement('details');
      det.innerHTML =
        '<summary>' +
          '<span class="chevron">&#9654;</span>' +
          '<span class="sum-label ' + (ok ? 't-pass' : 't-fail') + '">' + esc(label) + '</span>' +
          '<span class="badge ' + (ok ? 'bp' : 'bf') + '" style="font-size:10px">' + (ok ? 'ok' : 'failed') + '</span>' +
          retryBadge +
        '</summary>' + inner;
      outBody.appendChild(det);
    });

    // log panel
    panelLog.classList.remove('hidden');
    var logBody = $('log-body');
    logBody.innerHTML = '';

    appendLog(logBody, 'runId',     run.runId       || '\u2014', '');
    appendLog(logBody, 'assetIds',  (run.assetIds   || []).join(', '), '');
    appendLog(logBody, 'mode',      run.mode        || '\u2014', '');
    appendLog(logBody, 'started',   run.startedAt   || '\u2014', '');
    appendLog(logBody, 'completed', run.completedAt || '\u2014', '');
    appendLog(logBody, 'status',    status, '');

    jobs.forEach(function (job) {
      var retries = Array.isArray(job.retries) ? job.retries : [];
      appendLog(logBody,
        'job [' + (STAGE_LABELS[job.pipelineId] || job.pipelineId) + ']',
        job.status + (job.startedAt ? '  ' + fmtTime(job.startedAt) + ' \u2192 ' + fmtTime(job.completedAt) : ''),
        job.status === 'complete' ? '' : 'log-warn'
      );
      if (job.error) {
        appendLog(logBody, '  error', job.error, 'log-err');
      }
      retries.forEach(function (r) {
        appendLog(logBody,
          '  retry #' + r.attempt,
          r.error || 'no detail',
          'log-warn'
        );
      });
    });
  }

  // ── single-stage rerun (inline row button) ────────────────────────────────
  function triggerSingleRerun(job) {
    var assetId = $('asset-id').value.trim() || 'vst';
    var content = $('source-content').value.trim();

    reset();
    $('header-status').textContent = 'rerunning\u2026';

    fetch('/ai-lab/run', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        assetId:   assetId,
        assetName: $('asset-name').value.trim() || assetId,
        sources:   [{ kind: 'doc', label: 'Operator input', content: content }],
        pipelines: [job.pipelineId]
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.error) renderError(data.error);
      else { renderRun(data); loadHistory(); }
    })
    .catch(function (err) { renderError(err.message || 'Network error'); });
  }

  // ── error path ────────────────────────────────────────────────────────────
  function renderError(msg) {
    panelLog.classList.remove('hidden');
    var logBody = $('log-body');
    logBody.innerHTML = '';
    appendLog(logBody, 'error', msg, 'log-err');
    $('header-status').textContent = 'error';
  }

  // ── helpers ───────────────────────────────────────────────────────────────
  function reset() {
    panelStatus.classList.add('hidden');
    panelOutput.classList.add('hidden');
    panelLog.classList.add('hidden');
    rerunBar.classList.add('hidden');
    $('stage-tbody').innerHTML  = '';
    $('meta-row').innerHTML     = '';
    $('output-body').innerHTML  = '';
    $('log-body').innerHTML     = '';
    $('failed-lbl').textContent = '';
    _activeFailedJob = null;
  }

  function setLoading(on) {
    btn.disabled    = on;
    btn.innerHTML   = on ? '<span class="spin"></span>Running\u2026' : '&#9654; Run Pipeline';
    $('header-status').textContent = on ? 'running\u2026' : 'idle';
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtTime(iso) {
    if (!iso) return '\u2014';
    try { return new Date(iso).toLocaleTimeString(); } catch (_) { return iso; }
  }

  function metaItem(key, val, cls) {
    return '<div class="meta-item"><span class="meta-k">' + esc(key) + '</span>'
         + '<span class="' + cls + '">' + esc(String(val)) + '</span></div>';
  }

  function appendLog(container, key, val, cls) {
    var div = document.createElement('div');
    div.className = 'log-line';
    div.innerHTML =
      '<span class="log-k">' + esc(key) + '</span>' +
      '<span class="log-v ' + cls + '">' + esc(String(val)) + '</span>';
    container.appendChild(div);
  }

}());
</script>
<script id="part3-ui">
(function () {
  'use strict';

  /* ── copy-to-clipboard utility ─────────────────────────────────────────── */
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(function () {
      var orig = btn.textContent;
      btn.textContent = 'copied';
      setTimeout(function () { btn.textContent = orig; }, 1400);
    }).catch(function () {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      var orig = btn.textContent;
      btn.textContent = 'copied';
      setTimeout(function () { btn.textContent = orig; }, 1400);
    });
  }

  /* ── inject copy button styles ─────────────────────────────────────────── */
  var s = document.createElement('style');
  s.textContent = [
    '.btn-copy{padding:2px 8px;font:inherit;font-size:10px;font-weight:700;',
    'text-transform:uppercase;letter-spacing:.07em;background:rgba(88,166,255,.08);',
    'color:var(--accent);border:1px solid rgba(88,166,255,.25);border-radius:3px;',
    'cursor:pointer;white-space:nowrap}',
    '.btn-copy:hover{background:rgba(88,166,255,.16)}',
    '.panel-head .btn-copy{margin-left:auto}'
  ].join('');
  document.head.appendChild(s);

  /* ── auto-select latest run after history renders ───────────────────────── */
  var _origRenderHistory = null;
  function patchRenderHistory() {
    var script = document.getElementById('app-script');
    if (!script) return;
    // Hook into history list click — observe first item appearing
    var observer = new MutationObserver(function () {
      var first = document.querySelector('#history-list .history-item');
      if (first) {
        observer.disconnect();
        first.click();
      }
    });
    var list = document.getElementById('history-list');
    if (list) observer.observe(list, { childList: true });
  }
  patchRenderHistory();

  /* ── keyboard navigation on history list ────────────────────────────────── */
  document.getElementById('history-list').addEventListener('keydown', function (e) {
    var items = Array.from(document.querySelectorAll('#history-list .history-item'));
    if (!items.length) return;
    var active = document.querySelector('#history-list .history-item.active');
    var idx = active ? items.indexOf(active) : -1;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      var next = items[Math.min(idx + 1, items.length - 1)];
      if (next) next.click();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      var prev = items[Math.max(idx - 1, 0)];
      if (prev) prev.click();
    }
  });
  document.getElementById('history-list').setAttribute('tabindex', '0');

  /* ── copy run ID — injected into meta-row after render ──────────────────── */
  var metaObserver = new MutationObserver(function () {
    var metaRow = document.getElementById('meta-row');
    if (!metaRow || metaRow.querySelector('.btn-copy')) return;
    var items = metaRow.querySelectorAll('.meta-item');
    var runIdItem = null;
    items.forEach(function (el) {
      if (el.textContent.indexOf('Run ID') !== -1) runIdItem = el;
    });
    if (!runIdItem) return;
    var valEl = runIdItem.querySelector('span:last-child');
    if (!valEl || valEl.textContent === '\u2014') return;
    var runId = valEl.textContent;
    var btn = document.createElement('button');
    btn.className = 'btn-copy';
    btn.textContent = 'copy id';
    btn.style.marginLeft = '8px';
    btn.addEventListener('click', function () { copyText(runId, btn); });
    runIdItem.appendChild(btn);
  });
  metaObserver.observe(document.getElementById('meta-row'), { childList: true, subtree: true });

  /* ── copy JSON output per stage ─────────────────────────────────────────── */
  document.getElementById('output-body').addEventListener('click', function (e) {
    if (e.target.classList.contains('btn-copy') && e.target.dataset.copyTarget) {
      var pre = document.querySelector(e.target.dataset.copyTarget);
      if (pre) copyText(pre.textContent, e.target);
    }
  });

  var outObserver = new MutationObserver(function () {
    var outBody = document.getElementById('output-body');
    outBody.querySelectorAll('details').forEach(function (det, i) {
      if (det.querySelector('.btn-copy')) return;
      var pre = det.querySelector('pre.json-out');
      if (!pre) return;
      pre.id = pre.id || ('json-out-' + i);
      var btn = document.createElement('button');
      btn.className = 'btn-copy';
      btn.textContent = 'copy json';
      btn.dataset.copyTarget = '#' + pre.id;
      btn.style.marginLeft = 'auto';
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        copyText(pre.textContent, btn);
      });
      var summary = det.querySelector('summary');
      if (summary) summary.appendChild(btn);
    });
  });
  outObserver.observe(document.getElementById('output-body'), { childList: true, subtree: false });

  /* ── VST preset button ──────────────────────────────────────────────────── */
  var inputHead = document.querySelector('#panel-input .panel-head');
  if (inputHead) {
    var presetBtn = document.createElement('button');
    presetBtn.className = 'btn-copy';
    presetBtn.textContent = 'load vst preset';
    presetBtn.addEventListener('click', function () {
      var ta = document.getElementById('source-content');
      if (ta && ta.value.trim() !== '') {
        if (!confirm('Replace current content with VST preset?')) return;
      }
      document.getElementById('asset-id').value   = 'vst';
      document.getElementById('asset-name').value = 'Voyage Smart Travels';
      if (ta) ta.value = ta.dataset.vstSeed || ta.value;
    });
    inputHead.appendChild(presetBtn);
  }

}());
</script>
</body>
