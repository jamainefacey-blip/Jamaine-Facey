<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="description" content="Mr Pain PT — coach-guided rehabilitation app" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Mr Pain PT</title>
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-logo" id="header-logo">MP</div>
      <div class="header-title" id="header-title">Mr Pain PT</div>
      <div class="header-right" id="header-right"></div>
    </div>
  </header>

  <!-- ── Main content (rendered by app.js) ─────────────────────── -->
  <main class="app-main" id="app-main">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <span>Loading your program…</span>
    </div>
  </main>

  <!-- ── Bottom navigation ──────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Home
    </button>
    <button class="nav-btn" data-view="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Plan
    </button>
    <button class="nav-btn" data-view="exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
      Exercises
    </button>
    <button class="nav-btn" data-view="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
      Progress
    </button>
    <button class="nav-btn" data-view="notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Coach
    </button>
  </nav>

</div><!-- #app -->

<!-- ── Modal overlay ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" id="modal-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ─────────────────────────────────────────────────────────────────
     Script load order (all globals, no module bundler required):

       1. Engine utilities   — progress, validate, access
       2. Shared data        — exercise library
       3. Dynamic loader     — reads ?client= URL param, then loads:
            a) client data file   (CLIENT_CONFIG + PROGRAM globals)
            b) app controller     (app.js)

     Client routing:
       index.html                          → default (sarah-thompson)
       index.html?client=james-chen        → one_off mode
       index.html?client=maria-santos      → multi_week (4-week)
       index.html?client=david-park        → ongoing_coaching
       index.html?client=sarah-thompson    → multi_week (12-week ACL)

     Adding a new client:
       1. Create scripts/data/clients/<slug>.js
       2. Add the slug to KNOWN_CLIENTS in engine/loader.js
       3. Load via ?client=<slug>
     ───────────────────────────────────────────────────────────────── -->

<!-- Engine layer (no DOM, no data — pure utility) -->
<script src="scripts/engine/progress.js"></script>
<script src="scripts/engine/validate.js"></script>
<script src="scripts/engine/access.js"></script>

<!-- Shared exercise library (used by all clients) -->
<script src="scripts/data/exercises.js"></script>

<!-- Dynamic loader: selects client from ?client= param, then boots app.js -->
<script src="scripts/engine/loader.js"></script>

</body>
</html>
