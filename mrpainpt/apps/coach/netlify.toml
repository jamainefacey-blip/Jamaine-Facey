# ─────────────────────────────────────────────────────────────────────────────
# COACH PORTAL — Netlify deployment configuration
#
# Used when the coach portal is deployed as a standalone Netlify site.
# The root netlify.toml handles the client app (mrpainpt/apps/client).
#
# Routing: hash-based (#clients, #library, #client/:slug/:tab)
#   Hash routing is fully client-side — no server-side redirect rules
#   required for navigation. The SPA fallback below covers direct URL
#   access and browser refresh on any path.
#
# Phase 4: When the API layer is added, uncomment the API proxy redirect
#   block below and deploy the server component.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."
  command = "echo No build step — coach portal is plain HTML/CSS/JS"

# ── SPA fallback ──────────────────────────────────────────────────────────────
# Ensures index.html is served for any direct path access (e.g. a browser
# refresh or a shared link without a hash). Hash routing handles the rest
# entirely on the client side.

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Asset caching ─────────────────────────────────────────────────────────────
# CSS and JS assets are content-addressed by filename convention.
# Long cache lifetimes are safe because any content change requires a
# git commit, which triggers a new Netlify deploy.

[[headers]]
  for = "/styles/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Phase 4: API proxy (NOT YET ACTIVE) ──────────────────────────────────────
# Uncomment when the API layer is deployed. All /api/* calls will proxy
# to the coach portal server. No view file changes required — loadClient()
# in loader.js handles the switch from globals to fetch().
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://coach-api.mrpainpt.com/:splat"
#   status = 200
#   force  = true
