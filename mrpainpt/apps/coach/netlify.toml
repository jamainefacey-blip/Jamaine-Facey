# ─────────────────────────────────────────────────────────────────────────────
# COACH PORTAL — Netlify deployment configuration
#
# Used when the coach portal is deployed as a standalone Netlify site.
# The root netlify.toml handles the client app (mrpainpt/apps/client).
#
# Routing: hash-based (#clients, #library, #client/:slug/:tab)
#   Hash routing is fully client-side. The SPA fallback below covers direct
#   URL access and browser refresh on any path.
#
# API: Netlify Function at api/functions/api.js handles all /api/* requests.
#   The /api/* redirect MUST appear before the /* SPA fallback so that API
#   calls are not swallowed by the fallback rule.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish  = "."
  command  = "echo No build step — coach portal is plain HTML/CSS/JS"
  functions = "api/functions"

# ── API proxy — MUST be before the SPA fallback ───────────────────────────────
# Routes all /api/* requests to the Netlify Function handler.
# force = true: match even if a static file exists at this path (none do).

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── SPA fallback ──────────────────────────────────────────────────────────────
# Serves index.html for any non-API path so hash routing works on refresh/share.

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Asset caching ─────────────────────────────────────────────────────────────
# CSS and JS assets are content-addressed by filename convention.
# Long cache lifetimes are safe because any content change requires a
# git commit, which triggers a new Netlify deploy.

[[headers]]
  for = "/styles/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
