[dev]
framework = "#static"

[build]
command = "echo No build step — static site"
publish = "fhi"
ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

[context.production]
environment = { FHI_ENV = "production" }

# Rehab client preserved at /rehab path
[[redirects]]
from = "/rehab/*"
to = "/tools/rehab-client/:splat"
status = 200

# SPA fallback — hash routing is client-side
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
  function = "pain-system"
  path = "/pain-system"

[[edge_functions]]
  function = "fhi-api"
  path = "/api/fhi/*"
