[dev]
framework = "#static"
publish   = "tools/rehab-client"

[build]
command = "node tools/build-ai-lab-index.js"
publish = "tools/rehab-client"
ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

[context.production]
environment = { MY_IMPORTANT_VARIABLE = "this is a very important secret" }


[[redirects]]
from = "/img/og/:text"
to = "https://res.cloudinary.com/netlify/image/upload/c_fit,g_west,h_400,co_rgb:FFFFFFFF,l_text:netlify.com:Pacaembu-Bold.ttf_57::text,w_1053,x_46/v1619123320/netlify.com/default-og-background-learn-more.png"
status = 200

# AI Lab execution panel — declared before SPA catch-all; both with and without
# trailing slash so Safari's automatic slash-append doesn't fall through.
[[redirects]]
from   = "/ai-lab"
to     = "/ai-lab/index.html"
status = 200

[[redirects]]
from   = "/ai-lab/"
to     = "/ai-lab/index.html"
status = 200

# SPA fallback — hash routing is client-side, but this ensures any bare
# path (e.g. a mis-typed /dashboard instead of /#dashboard) loads the app.
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[edge_functions]]
  function = "pain-system"
  path = "/pain-system"

[[edge_functions]]
  function = "ai-lab-run"
  path = "/ai-lab/run"

[[edge_functions]]
  function = "ai-lab-status"
  path = "/ai-lab/status"

[[edge_functions]]
  function = "ai-lab-extract"
  path = "/ai-lab/extract"
